<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pixel Party</title>
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Lightweight browser arcade</p>
        <h1><img class="title-art" src="assets/images/pixel-party-title.png" alt="Pixel Party"></h1>
      </div>
      <div id="library-count" class="header-badge">Loading</div>
    </header>

    <main class="menu-wrap">
      <section class="menu-tools" aria-label="Game filters">
        <label class="search-box">
          <span>Search</span>
          <input id="game-search" type="search" autocomplete="off" placeholder="Find Tetris, Snake, 2048...">
        </label>
        <div id="category-buttons" class="category-buttons" aria-label="Categories"></div>
      </section>

      <section>
        <div class="section-line">
          <h2>Pick Up And Play</h2>
          <p id="result-count"></p>
        </div>
        <div id="game-grid" class="game-grid" aria-live="polite"></div>
      </section>
    </main>

    <script src="assets/js/catalog.js"></script>
    <script src="assets/js/menu.js"></script>
  </body>
</html>
